[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "Unicode-DFS-2016", "ISC", "BSD-2-Clause", "BSD-3-Clause", "Zlib", "MPL-2.0", "CC0-1.0", "OpenSSL"]
copyleft = "deny"

[bans]
version = 2
multiple-versions = "warn"

[sources]
version = 2
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
